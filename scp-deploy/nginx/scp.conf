# Strategic Control Portal — reverse-proxy snippet
# Add this INSIDE the existing `server { ... }` block that already serves
# rathinamtechnicalcampus.com (the one with your TLS certs).
#
# Do NOT create a new server block. Just paste these two location blocks in
# alongside whatever else that server already serves.

# ----- /scp/ -> Next.js container on 127.0.0.1:3000 -----
location /scp/ {
    proxy_pass         http://127.0.0.1:3000;
    proxy_http_version 1.1;

    proxy_set_header   Host               $host;
    proxy_set_header   X-Real-IP          $remote_addr;
    proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto  $scheme;
    proxy_set_header   X-Forwarded-Host   $host;

    # WebSocket / Server-Sent Events / Next.js HMR-style upgrades
    proxy_set_header   Upgrade            $http_upgrade;
    proxy_set_header   Connection         "upgrade";

    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_buffering    off;

    # Allow attachments / image uploads if the app ever needs it
    client_max_body_size 25m;
}

# Some browsers request /scp without trailing slash — redirect cleanly.
location = /scp {
    return 301 /scp/;
}
